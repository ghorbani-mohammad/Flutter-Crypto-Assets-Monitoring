workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      codemagic: default
    environment:
      flutter: stable
      xcode: latest
      node: latest
      groups:
        - google_credentials
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze
      - name: Build App Bundle
        script: flutter build appbundle --debug
    artifacts:
      - build/app/outputs/bundle/debug/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com 